<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DailyDex Cockpit — Creator Mode</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="{{ url_for('static', filename='cockpit/cockpit.css') }}" />
</head>
<body>
  <div id="root"></div>

  <!-- Live data injected server-side (matches prototype DD_DATA shape) -->
  <script>window.DD_DATA = {{ dd_data | tojson }};</script>

  <!-- React + Babel (CDN) — production builds: smaller, faster, no dev-only overhead -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/marked@12.0.1/marked.min.js" crossorigin="anonymous"></script>

  <!-- Live backend bridge (plain JS, defines window.DDX) -->
  <script src="{{ url_for('static', filename='cockpit/cockpit-live.js') }}"></script>

  <!-- Tweaks shell + components (precompiled JSX -> JS; see `npm run build:cockpit`) -->
  <script src="{{ url_for('static', filename='cockpit/tweaks-panel.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/icons.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/shared.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/AppShell.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/PulseView.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/BriefView.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/ClustersView.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/ThumbsView.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/ResearchView.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/PipelineView.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/StudioView.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/BenchmarksView.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/CopilotChatView.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/SettingsView.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/ProfileView.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/OnboardingView.js') }}"></script>
  <script src="{{ url_for('static', filename='cockpit/src/App.js') }}"></script>
</body>
</html>
